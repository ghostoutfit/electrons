<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrons</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Variables ─────────────────────────────────────────────────────────── */
  :root {
    --accent1:      #ff2d78;
    --accent1-dim:  rgba(255,45,120,0.22);
    --accent1-glow: rgba(255,45,120,0.55);
    --accent2:      #1a6eff;
    --accent2-dim:  rgba(26,110,255,0.18);
    --accent2-glow: rgba(26,110,255,0.45);
    --ui-bg:        rgba(8,6,24,0.42);
    --ui-border:    rgba(255,255,255,0.07);
    --text-dim:     rgba(220,215,255,0.55);
    --text-bright:  rgba(240,235,255,0.92);
  }

  /* ── Reset & base ──────────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #05040f;
    color: var(--text-bright);
    font-family: 'Lexend', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  button, input, select {
    font-family: 'Lexend', sans-serif;
  }

  /* ── Full-viewport canvas ──────────────────────────────────────────────── */
  #canvas {
    position: fixed;
    top: 0; left: 0;
    display: block;
    z-index: 0;
  }

  /* ── Toolbar — floating glass overlay ─────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 20px 10px;
    background: var(--ui-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.55);
  }

  .toolbar-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  /* ── Tab bar ───────────────────────────────────────────────────────────── */
  #tabBar {
    display: flex;
    gap: 8px;
    padding-bottom: 2px;
  }
  .tab-btn {
    padding: 4px 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: none;
    text-shadow: none;
    font-family: inherit;
  }
  /* Navigation tabs (links to other sims) inherit tab-btn appearance */
  a.tab-btn { text-decoration: none; cursor: pointer; }

  .tab-btn:hover {
    color: rgba(255,255,255,0.38);
    border-color: rgba(255,255,255,0.12);
  }
  .tab-btn.active {
    color: #e8e4ff;
    border-color: #7b6fff;
    background: rgba(123,111,255,0.12);
    box-shadow:
      inset 0 0 6px rgba(123,111,255,0.15),
      0 0 2px #7b6fff,
      0 0 8px #7b6fff,
      0 0 18px rgba(123,111,255,0.45),
      0 0 40px rgba(123,111,255,0.15),
      0 0 70px rgba(123,111,255,0.08);
    text-shadow:
      0 0 4px #e8e4ff,
      0 0 10px #7b6fff,
      0 0 22px rgba(123,111,255,0.6),
      0 0 44px rgba(123,111,255,0.25);
  }

  /* ── Buttons ───────────────────────────────────────────────────────────── */
  .btn {
    padding: 4px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover {
    color: rgba(255,255,255,0.38);
    border-color: rgba(255,255,255,0.12);
  }

  /* Go idle (▶) — accent2 themed */
  #goBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow),
      0 0 44px var(--accent2-dim);
    display: flex; align-items: center; justify-content: center;
  }
  #goBtn:hover { background: var(--accent2-glow); }
  /* Go running (❙ ❙) — red */
  #goBtn.running {
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 6px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 8px #ff4040,
      0 0 18px rgba(255,40,40,0.5),
      0 0 40px rgba(255,40,40,0.2);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px #ff4040, 0 0 22px rgba(255,80,80,0.6);
  }
  #goBtn.running:hover { background: rgba(255,40,40,0.3); }

  /* Clear — accent2 themed */
  #clearBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow);
  }
  #clearBtn:hover { background: var(--accent2-glow); }

  /* Go / New — squished symbol buttons */
  #goBtn, #newBtn { padding: 8px 28px; font-size: 22px; letter-spacing: 2px; }
  #goBtn { font-size: 24px; letter-spacing: 0; padding: 7px 0; width: 90px; line-height: 1; }

  /* ========================================
     BUTTON GROUPS — stacked option pickers
     ======================================== */
  .awheel-item {
    display: block;
    padding: 2px 12px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 5px;
    background: transparent;
    color: rgba(255,255,255,0.15);
    font-size: 10px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    letter-spacing: 0.5px;
    transition: color 0.15s, border-color 0.15s, background 0.15s,
                box-shadow 0.15s, text-shadow 0.15s,
                opacity 0.18s ease, transform 0.22s ease;
  }
  .awheel-item:hover:not(.active) {
    color: var(--accent2);
    border-color: var(--accent2);
    background: var(--accent2-dim);
    box-shadow:
      0 0 4px var(--accent2),
      0 0 12px var(--accent2-glow),
      0 0 26px var(--accent2-dim);
    text-shadow:
      0 0 6px var(--accent2),
      0 0 14px var(--accent2-glow);
  }
  .awheel-item.active {
    color: var(--accent2);
    border-color: var(--accent2);
    background: var(--accent2-dim);
    box-shadow:
      0 0 3px var(--accent2),
      0 0 9px var(--accent2-glow),
      0 0 20px var(--accent2-dim);
    text-shadow:
      0 0 5px var(--accent2),
      0 0 12px var(--accent2-glow);
  }

  /* New — neon pink, matches Go */
  #newBtn {
    border-color: var(--accent1);
    color: rgba(255,255,255,0.5);
    background: var(--accent1-dim);
    box-shadow:
      inset 0 0 6px var(--accent1-dim),
      0 0 2px var(--accent1),
      0 0 8px var(--accent1),
      0 0 18px var(--accent1-glow),
      0 0 40px var(--accent1-dim),
      0 0 70px var(--accent1-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent1),
      0 0 22px var(--accent1-glow),
      0 0 44px var(--accent1-dim);
  }
  #newBtn:hover {
    background: var(--accent1-glow);
    box-shadow:
      inset 0 0 10px var(--accent1-glow),
      0 0 4px var(--accent1),
      0 0 14px var(--accent1),
      0 0 28px var(--accent1-glow),
      0 0 60px var(--accent1-dim),
      0 0 100px var(--accent1-dim);
  }

  /* ── Sliders ───────────────────────────────────────────────────────────── */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 3px;
    background: rgba(255,255,255,0.10);
    box-shadow:
      0 0 4px var(--accent2),
      0 0 12px var(--accent2-glow),
      0 0 28px var(--accent2-dim);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 24px;
    border-radius: 3px;
    background: var(--accent2);
    border: none;
    box-shadow:
      0 0 3px var(--accent2),
      0 0 10px var(--accent2-glow),
      0 0 24px var(--accent2-dim),
      0 0 44px var(--accent2-dim);
    cursor: grab;
    transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:active {
    cursor: grabbing;
    box-shadow:
      0 0 4px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
  }
  input[type="range"]::-moz-range-thumb {
    width: 10px; height: 24px;
    border-radius: 3px;
    background: var(--accent2);
    border: none;
    box-shadow: 0 0 3px var(--accent2), 0 0 10px var(--accent2-glow);
    cursor: grab;
  }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Control boxes ─────────────────────────────────────────────────────── */
  .ctrl-box-pink {
    display: flex;
    align-items: center;
    align-self: stretch;
    gap: 14px;
    background: rgba(255,45,120,0.07);
    border: 1px solid rgba(255,45,120,0.22);
    border-radius: 12px;
    padding: 10px 16px;
    position: relative;
  }
  .ctrl-box-pink input[type="range"] { width: 120px; }
  .ctrl-box-label {
    position: absolute;
    bottom: 100%;
    margin-bottom: 3px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    pointer-events: none;
  }
  .ctrl-box-label-pink {
    right: 14px;
    color: rgba(255,45,120,0.8);
    text-shadow: 0 0 6px rgba(255,45,120,0.6), 0 0 16px rgba(255,45,120,0.3);
  }
  .ctrl-box-label-blue {
    left: 14px;
    color: var(--accent2);
    opacity: 0.8;
    text-shadow: 0 0 6px var(--accent2-glow), 0 0 16px var(--accent2-dim);
  }

  /* ── NEW button nucleus wheel (pwheel-style hover dropdown) ────────────────── */
  .pwheel { position: relative; display: flex; flex-direction: column; align-self: stretch; }
  .pwheel-drop {
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    transform: translateY(-4px);
    display: flex;
    flex-direction: row;
    gap: 6px;
    padding: 8px;
    background: rgba(8,6,24,0.97);
    border: 1px solid rgba(255,45,120,0.28);
    border-radius: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 200;
  }
  .pwheel.open .pwheel-drop { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .pwheel.locked { opacity: 0.35; pointer-events: none; }
  .nucleus-opt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
  }
  .nucleus-opt:hover { border-color: rgba(255,45,120,0.35); background: rgba(255,45,120,0.08); }
  .nucleus-opt.selected { border-color: rgba(255,45,120,0.65); background: rgba(255,45,120,0.15); }
  .nucleus-opt-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: rgba(255,255,255,0.75); font-family: inherit; }

  .ctrl-box-blue {
    display: flex;
    align-items: center;
    align-self: stretch;
    gap: 18px;
    background: var(--accent2-dim);
    border: 1px solid var(--accent2);
    border-radius: 12px;
    padding: 10px 16px;
    position: relative;
  }
  .ctrl-box-blue input[type="range"] { width: 150px; }
  .ctrl-box-blue .slider-icon { font-size: 28px; }
  .ctrl-box-blue .toggle-label { font-size: 13px; gap: 6px; }
  .ctrl-box-blue .field-label-electric { font-size: 13px; }
  .ctrl-box-blue .awheel-item { font-size: 14px; padding: 5px 14px; }
  .slider-group label {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .slider-group label span {
    display: inline-block;
    min-width: 3em;
    text-align: right;
    color: var(--accent2);
    text-shadow: 0 0 5px var(--accent2-glow);
  }
  .slider-group input[type="range"] { width: 80px; }

  .slider-icon {
    font-size: 18px;
    line-height: 1;
    user-select: none;
    filter:
      brightness(0) invert(1)
      blur(0.5px)
      opacity(0.65)
      drop-shadow(0 0 4px var(--accent2))
      drop-shadow(0 0 12px var(--accent2))
      drop-shadow(0 0 24px var(--accent2-glow));
  }

  /* ── Toggle labels ─────────────────────────────────────────────────────── */
  .toggle-label {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent1); }

  .field-label-electric {
    color: #46a5ff;
    text-shadow:
      0 0 4px #46a5ff,
      0 0 10px rgba(70,165,255,0.5),
      0 0 22px rgba(70,165,255,0.2);
  }

  /* ── Scrub bar — floating glass at bottom ──────────────────────────────── */
  #scrubBar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: none;
    flex-direction: row;
    background: var(--ui-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid var(--ui-border);
    box-shadow: 0 -1px 0 var(--accent1-dim), 0 -4px 20px rgba(0,0,0,0.5);
  }
  #scrubBar.visible { display: flex; }
  /* Left panel: key labels + replay/clock controls */
  #scrubLeftPanel {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    flex-shrink: 0;
    width: 112px;
    border-right: 1px solid var(--ui-border);
  }
  #scrubGraphKey {
    display: none;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    justify-content: center;
    padding: 0 8px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 0.02em;
  }
  #scrubGraphKey.visible { display: flex; }
  #scrubControls {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 80px;
    padding: 0 8px;
    flex-shrink: 0;
  }
  /* Right panel: energyMain (graph+slider) + scrubRowRight (pct+toggle) */
  #scrubRightPanel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: row;
  }
  #energyMain {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    padding: 6px 0;
  }
  #phaseTimeline {
    display: flex; align-items: stretch;
    height: 18px; margin: 0;
    border-radius: 0; overflow: hidden; gap: 0;
  }
  #phaseTimeline .phase-seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    overflow: hidden; white-space: nowrap; min-width: 0; transition: opacity 0.15s;
    text-shadow: 0 0 8px currentColor;
  }
  #egZoomHint {
    font-size: 12px;
    color: rgba(220,215,255,0.45);
    text-align: center;
    letter-spacing: 0.02em;
    margin-top: 4px;
  }
  #scrubRowRight {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    width: 270px;
  }
  #scrubButtons {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 80px;
    padding: 0 12px;
    flex-shrink: 0;
    margin-top: auto;
  }
  #energyGraphBox {
    display: none;
    flex-direction: column;
    border-bottom: 1px solid rgba(26,110,255,0.25);
    background: rgba(26,110,255,0.04);
  }
  #energyGraphBox.visible { display: flex; }
  #scrubPercents {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 12px;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  #scrubPercents.visible { display: flex; }
  #energyPctNums {
    display: flex;
    gap: 10px;
  }
  #energyPctNote {
    font-size: 12px;
    color: #ff3a6e;
    text-align: center;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  #energyGraphToggle {
    border: 1px solid var(--accent2);
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    background: var(--accent2-dim);
    color: rgba(255,255,255,0.5);
    font-family: inherit;
    flex: 1;
    line-height: 1.25;
    padding: 6px 10px;
    text-align: center;
    white-space: normal;
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2), 0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow), 0 0 40px var(--accent2-dim);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px var(--accent2);
    transition: all 0.2s;
  }
  #energyGraphToggle:hover { background: var(--accent2-glow); }
  #energyGraphToggle.active {
    box-shadow:
      inset 0 0 8px var(--accent2-dim),
      0 0 4px var(--accent2), 0 0 14px var(--accent2),
      0 0 28px var(--accent2-glow), 0 0 55px var(--accent2-dim);
  }
  #energyGraph {
    display: block;
    width: 100%;
    height: 110px;
    cursor: crosshair;
  }
  #scrubRow {
    display: flex;
    align-items: center;
    height: 55px;
    padding: 0;
  }
  #scrubBar .scrub-label {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #scrubSlider { flex: 1; }
  #scrubSlider:disabled { opacity: 0.18; cursor: not-allowed; }
  #scrubPct { display: none; }

  .theme-btn {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    box-shadow: none;
  }
  .theme-btn:hover { transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.3); }
  .theme-btn.active {
    border-color: rgba(255,255,255,0.55);
    box-shadow: 0 0 6px rgba(255,255,255,0.4), 0 0 14px rgba(255,255,255,0.15);
  }
  #themeA { background: #1a6eff; }
  #themeB { background: #bd00ff; }
  #themeC { background: #00f5e0; }
  #themeLight { background: #fff; }
  #bgColorPicker { display:none; width:22px; height:22px; padding:2px; border-radius:4px; border:1px solid rgba(0,0,0,0.25); cursor:pointer; vertical-align:middle; margin-left:4px; }
  body.screenshot-mode #bgColorPicker { display:inline-block; }
  body.screenshot-mode #themeLight { display: none; }
  body.screenshot-mode { background: var(--bg-color, #fff) !important; }
  body.screenshot-mode #toolbar { background: rgba(255,255,255,0.42) !important; box-shadow: none !important; }
  body.screenshot-mode #toolbar,
  body.screenshot-mode #toolbar * {
    color: #000 !important;
    text-shadow: none !important;
  }
  body.screenshot-mode #toolbar button {
    border-color: #000 !important;
    box-shadow: none !important;
  }
  body.screenshot-mode #toolbar .tab-btn:not(.active) {
    color: #888 !important;
    border-color: #888 !important;
    background: transparent !important;
  }
  body.screenshot-mode #toolbar .tab-btn.active {
    color: #000 !important;
    border-color: #000 !important;
    background: rgba(0,0,0,0.06) !important;
  }
  body.screenshot-mode input[type="range"] {
    box-shadow: none !important;
    background: rgba(0,0,0,0.15) !important;
  }
  body.screenshot-mode input[type="range"]::-webkit-slider-thumb {

<script>
// ── Atom Builder JS ──────────────────────────────────────────────────────────
// ─── Constants ────────────────────────────────────────────────────────────────
const PARTICLE_RADIUS = 10;
const coulombStrength = 150;

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const egCanvas = document.getElementById('energyGraph');
const egCtx    = egCanvas.getContext('2d');

// ─── Heatmap buffers ──────────────────────────────────────────────────────────
const hmCanvas    = document.createElement('canvas');
const hmCtx       = hmCanvas.getContext('2d');
const hmComposite = document.createElement('canvas');
const hmcCtx      = hmComposite.getContext('2d');

let hmW = 0, hmH = 0;
let hmDataElec = null;
let hmImgElec  = null;
let heatmapDirty    = true;

// ── Quality selector ──────────────────────────────────────────────────────────
let _quality = 'hi-res';  // 'hi-res' | 'detailed' | 'simple'

// ── Dev perf toggles (driven by _applyQuality) ────────────────────────────────
let _flatFill = true;

function _applyQuality(level) {
  _quality = level;
  const el = document.getElementById('qualitySelect');
  if (el) el.value = level;
  _flatFill = true;
}

// Draws 100 gradient+shadowBlur particles to an offscreen canvas and returns ms.
// getImageData() at the end forces a GPU sync so the time is real.
// A 15-particle warm-up pass runs first to settle JIT and GPU init cost.
function _runPerfBenchmark() {
  const oc = document.createElement('canvas');
  oc.width = 300; oc.height = 300;
  const dc = oc.getContext('2d');
  const R = PARTICLE_RADIUS;
  for (let i = 0; i < 15; i++) {
    const x = 15 + (i % 5) * 40, y = 15 + Math.floor(i / 5) * 40;
    const g = dc.createRadialGradient(x, y, 0, x, y, R);
    g.addColorStop(0, '#ff1a65'); g.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
  }
  const t0 = performance.now();
  for (let i = 0; i < 100; i++) {
    const x = 15 + (i % 10) * 27, y = 15 + Math.floor(i / 10) * 27;
    const g1 = dc.createRadialGradient(x, y, 0, x, y, R * 1.1);
    g1.addColorStop(0, '#ff1a65'); g1.addColorStop(0.82, '#ff1a65'); g1.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g1; dc.beginPath(); dc.arc(x, y, R * 1.1, 0, Math.PI * 2); dc.fill();
    const g2 = dc.createRadialGradient(x, y, 0, x, y, R);
    g2.addColorStop(0, '#ff80b0'); g2.addColorStop(0.5, '#ff80b0'); g2.addColorStop(1, 'rgba(0,0,0,0)');
    dc.save(); dc.shadowColor = '#ff80b0'; dc.shadowBlur = 8; dc.globalAlpha = 0.82;
    dc.fillStyle = g2; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
    dc.restore(); dc.globalAlpha = 1;
  }
  dc.getImageData(0, 0, 1, 1); // force GPU flush so timing is real
  return performance.now() - t0;
}

function resize() {
  canvas.width   = window.innerWidth;
  canvas.height  = window.innerHeight;
  egCanvas.width  = Math.max(1, egCanvas.offsetWidth || (window.innerWidth - 112));
  egCanvas.height = 110;
  heatmapDirty   = true;
}
resize();
window.addEventListener('resize', () => {
  const oldCx = animParent ? animParent.cx : null;
  const oldCy = animParent ? animParent.cy : null;
  resize();
  heatmapDirty = true;
  if (animParent && oldCx !== null) {
    const newCx = canvas.width / 2;
    const newCy = canvas.height / 2;
    const dx = newCx - oldCx, dy = newCy - oldCy;
    animParent.cx = newCx; animParent.cy = newCy;
    for (const p of animParent.particles) { p.x += dx; p.y += dy; }
    buildNucleusImages();
    for (const e of electrons) {
      e.x += dx; e.y += dy;
      for (const t of e.trail) { t.x += dx; t.y += dy; }
    }
  }
  draw();
});

function ensureHmBuffers(w, h) {
  if (hmW === w && hmH === h) return;
  hmW = w; hmH = h;
  hmCanvas.width    = w; hmCanvas.height = h;
  hmDataElec = new Uint8ClampedArray(w * h * 4);
  hmImgElec  = new ImageData(hmDataElec, w, h);
}

// ─── Colormaps ────────────────────────────────────────────────────────────────
function buildColorstops(stops, out) {
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let s0 = stops[0], s1 = stops[1];
    for (let s = 0; s < stops.length - 1; s++) {
      if (t >= stops[s].t && t <= stops[s+1].t) { s0 = stops[s]; s1 = stops[s+1]; break; }
    }
    const f   = (s1.t === s0.t) ? 0 : (t - s0.t) / (s1.t - s0.t);
    const idx = i * 4;
    out[idx]   = s0.r + (s1.r - s0.r) * f;
    out[idx+1] = s0.g + (s1.g - s0.g) * f;
    out[idx+2] = s0.b + (s1.b - s0.b) * f;
    out[idx+3] = s0.a + (s1.a - s0.a) * f;
  }
}

const COLORMAP = new Uint8Array(256 * 4);
buildColorstops([
  { t: 0.0,  r: 0,   g: 0,   b: 0,   a: 0   },
  { t: 0.12, r: 10,  g: 35,  b: 170, a: 140 },
  { t: 0.4,  r: 25,  g: 85,  b: 235, a: 210 },
  { t: 0.7,  r: 70,  g: 165, b: 255, a: 245 },
  { t: 1.0,  r: 210, g: 238, b: 255, a: 255 },
], COLORMAP);

// ─── Particle generation — 3D sphere packing ──────────────────────────────────
function generateNucleus(nProtons, nNeutrons, cx, cy, seed) {
  // Seeded LCG so the same seed always produces the same layout
  let s = (seed >>> 0) || 1;
  const rand = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };

  const nTotal = nProtons + nNeutrons;

  const packFrac = 0.62;
  const vol      = nTotal * (4/3 * Math.PI * PARTICLE_RADIUS ** 3) / packFrac;
  const sphereR  = Math.cbrt(vol * 3 / (4 * Math.PI)) * 1.05;

  const minDist   = PARTICLE_RADIUS * 2.08;
  const minDistSq = minDist * minDist;

  const pts = [];
  for (let i = 0; i < nTotal; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 8000; attempt++) {
      const r   = sphereR * Math.cbrt(rand());
      const th  = Math.acos(2 * rand() - 1);
      const phi = 2 * Math.PI * rand();
      const lx  = r * Math.sin(th) * Math.cos(phi);
      const ly  = r * Math.sin(th) * Math.sin(phi);
      const lz  = r * Math.cos(th);
      let ok = true;
      for (const p of pts) {
        const dx = p.lx-lx, dy = p.ly-ly, dz = p.lz-lz;
        if (dx*dx + dy*dy + dz*dz < minDistSq) { ok = false; break; }
      }
      if (ok) { pts.push({ lx, ly, lz }); placed = true; break; }
    }
    if (!placed) {
      // Force-place at a random spot rather than stacking at center
      const r   = sphereR * 0.6 * rand();
      const th  = Math.acos(2 * rand() - 1);
      const phi = 2 * Math.PI * rand();
      pts.push({ lx: r*Math.sin(th)*Math.cos(phi), ly: r*Math.sin(th)*Math.sin(phi), lz: r*Math.cos(th) });
    }
  }

  const adjThresh2 = (PARTICLE_RADIUS * 2.9) ** 2;
  const adj = Array.from({ length: nTotal }, () => []);
  for (let i = 0; i < nTotal; i++) {
    for (let j = i+1; j < nTotal; j++) {
      const dx = pts[i].lx-pts[j].lx, dy = pts[i].ly-pts[j].ly, dz = pts[i].lz-pts[j].lz;
      if (dx*dx + dy*dy + dz*dz < adjThresh2) { adj[i].push(j); adj[j].push(i); }
    }
  }

  const types         = new Array(nTotal).fill('neutron');
  const protonNbCount = new Array(nTotal).fill(0);
  const order         = Array.from({ length: nTotal }, (_, i) => i).sort(() => rand() - 0.5);
  let placed = 0;
  for (let priority = 0; priority <= 6 && placed < nProtons; priority++) {
    for (const i of order) {
      if (placed >= nProtons) break;
      if (types[i] === 'proton' || protonNbCount[i] !== priority) continue;
      types[i] = 'proton';
      placed++;
      for (const nb of adj[i]) protonNbCount[nb]++;
    }
  }

  const particles = pts.map((p, i) => ({
    x: cx + p.lx, y: cy + p.ly, z: p.lz, type: types[i], i,
  }));

  return { particles, sphereR, cx, cy };
}

// ─── Electric field heatmap ───────────────────────────────────────────────────
// masks: [{cx, cy, r}] — soft radial clipping; alpha fades to 0 at r + PARTICLE_RADIUS*2
function drawElectricHeatmap(particleList, sampleFrac = 0.5, sigmaScale = 1.0, masks = null, boundsExpand = 50, destCtx = ctx, _forceRender = false) {
  const fullW = canvas.width, fullH = canvas.height;

  const _hmSizeMatch = hmComposite.width === fullW && hmComposite.height === fullH;
  if (!_forceRender && !heatmapDirty && _hmSizeMatch) {
    destCtx.drawImage(hmComposite, 0, 0);
    return;
  }
  const scale    = _quality === 'simple' ? 0.08 : _quality === 'detailed' ? 0.15 : 0.25;
  const w        = Math.ceil(fullW * scale);
  const h        = Math.ceil(fullH * scale);
  const invScale = 1 / scale;

  let protons = particleList.filter(p =>
    p.type === 'proton' &&
    p.x > -boundsExpand && p.x < fullW + boundsExpand &&
    p.y > -boundsExpand && p.y < fullH + boundsExpand
  );
  if (sampleFrac < 1.0) {
    protons = protons.filter((_, i) => i % Math.round(1 / sampleFrac) === 0);
  }

  const refEnergy = coulombStrength / (PARTICLE_RADIUS * 2);
  const logRef    = Math.log(2);
  const elecPairs = [];
  for (let i = 0; i < protons.length; i++) {
    for (let j = i+1; j < protons.length; j++) {
      const a = protons[i], b = protons[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.01) continue;
      const energy   = coulombStrength / dist;
      const sigma    = Math.max(3.5, 28 / Math.sqrt(dist)) * sigmaScale;
      const distFade = Math.exp(-dist / 350);
      const mag      = Math.min(1, Math.log(1 + energy / refEnergy) / logRef) * distFade;
      const cullSq   = 16 * (sigma*2) * (sigma*2);
      elecPairs.push({ ax: a.x, ay: a.y, ux: dx/dist, uy: dy/dist, dist, sigma, mag, cullSq });
    }
  }
  elecPairs.sort((a, b) => b.mag - a.mag);
  if (elecPairs.length === 0) return;

  ensureHmBuffers(w, h);
  hmDataElec.fill(0);

  // Clamp pixel loop to the bounding box of active protons — skips the large
  // empty canvas area around the nucleus, which is typically 90%+ of pixels.
  let bxMin = w, bxMax = 0, byMin = h, byMax = 0;
  for (const p of protons) {
    const sx = (p.x * scale) | 0, sy = (p.y * scale) | 0;
    if (sx < bxMin) bxMin = sx; if (sx > bxMax) bxMax = sx;
    if (sy < byMin) byMin = sy; if (sy > byMax) byMax = sy;
  }
  const bMarg = Math.ceil(50 * scale);  // max pair influence radius in world px
  bxMin = Math.max(0, bxMin - bMarg);  bxMax = Math.min(w - 1, bxMax + bMarg);
  byMin = Math.max(0, byMin - bMarg);  byMax = Math.min(h - 1, byMax + bMarg);

  for (let py = byMin; py <= byMax; py++) {
    const worldY = py * invScale;
    for (let px = bxMin; px <= bxMax; px++) {
      const worldX = px * invScale;
      let total = 0;
      for (let k = 0; k < elecPairs.length; k++) {
        const p    = elecPairs[k];
        const rx   = worldX - p.ax, ry = worldY - p.ay;
        const para = rx*p.ux + ry*p.uy;
        const e1   = para > 0 ? Math.min(1, para/8) : 0;
        const e2   = para < p.dist ? Math.min(1, (p.dist-para)/8) : 0;
        const ef   = e1 * e2;
        if (ef <= 0) continue;
        const perpSq = Math.max(0, rx*rx + ry*ry - para*para);
        if (perpSq > p.cullSq) continue;
        const t      = para / p.dist;
        const sigmaT = p.sigma * (1 + Math.sin(Math.PI * t));
        total += p.mag * Math.exp(-perpSq / (2*sigmaT*sigmaT)) * ef;
        if (total >= 1/3) break;
      }
      if (total > 0.002) {
        // Soft radial mask — clamp heatmap to nucleus boundary.
        // Supports two mask types:
        //   circle  { cx, cy, r, bleed }
        //   capsule { type:'capsule', cx1,cy1,r1, cx2,cy2,r2, bleed }
        //     — tapered hull between two spheres; fills the gap with no dark seam.
        let maskAlpha = 1;
        if (masks) {
          maskAlpha = 0;
          const defaultBleed = PARTICLE_RADIUS * 2;
          for (const m of masks) {
            if (maskAlpha >= 1) break;
            const bleed = m.bleed !== undefined ? m.bleed : defaultBleed;
            if (m.type === 'capsule') {
              // Project pixel onto the segment cx1→cx2, interpolate radius
              const sdx = m.cx2 - m.cx1, sdy = m.cy2 - m.cy1;
              const lenSq = sdx*sdx + sdy*sdy;
              const st = lenSq > 0
                ? Math.max(0, Math.min(1, ((worldX-m.cx1)*sdx + (worldY-m.cy1)*sdy) / lenSq))
                : 0;
              const projX = m.cx1 + st*sdx, projY = m.cy1 + st*sdy;
              const perpDist = Math.sqrt((worldX-projX)**2 + (worldY-projY)**2);
              const capsR = m.r1 + (m.r2 - m.r1) * st;
              if (perpDist <= capsR) { maskAlpha = 1; break; }
              const mt = (perpDist - capsR) / bleed;
              maskAlpha = Math.max(maskAlpha, mt < 1 ? 1 - mt : 0);
            } else {
              const mdx = worldX - m.cx, mdy = worldY - m.cy;
              const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
              if (mdist <= m.r) { maskAlpha = 1; break; }
              const mt = (mdist - m.r) / bleed;
              maskAlpha = Math.max(maskAlpha, mt < 1 ? 1 - mt : 0);
            }
          }
        }
        if (maskAlpha > 0) {
          const ci = Math.min(255, (total * 3.0 * 255)|0);
          const c4 = ci * 4;
          const di = (py * w + px) * 4;
          hmDataElec[di]   = COLORMAP[c4];   hmDataElec[di+1] = COLORMAP[c4+1];
          hmDataElec[di+2] = COLORMAP[c4+2];
          hmDataElec[di+3] = (COLORMAP[c4+3] * maskAlpha + 0.5) | 0;
        }
      }
    }
  }

  if (hmComposite.width !== fullW || hmComposite.height !== fullH) {
    hmComposite.width = fullW; hmComposite.height = fullH;
  }
  hmcCtx.clearRect(0, 0, fullW, fullH);
  hmcCtx.imageSmoothingEnabled = true;
  hmcCtx.imageSmoothingQuality = 'low';
  hmCtx.putImageData(hmImgElec, 0, 0);
  hmcCtx.drawImage(hmCanvas, 0, 0, fullW, fullH);
  destCtx.drawImage(hmComposite, 0, 0);
  if (destCtx === ctx) {
    heatmapDirty = false;
  }
}

// ─── Cloud outline — evenly-spaced scallop circles on a ring ─────────────────
function outerIntersection(c1, c2, R, ncx, ncy) {
  const dx = c2.x - c1.x, dy = c2.y - c1.y;
  const d  = Math.sqrt(dx * dx + dy * dy);
  const h  = Math.sqrt(Math.max(0, R * R - (d / 2) * (d / 2)));
  const mx = (c1.x + c2.x) / 2, my = (c1.y + c2.y) / 2;
  const px = -dy / d * h,  py =  dx / d * h;
  const p1 = { x: mx + px, y: my + py };
  const p2 = { x: mx - px, y: my - py };
  const d1 = (p1.x - ncx) ** 2 + (p1.y - ncy) ** 2;
  const d2 = (p2.x - ncx) ** 2 + (p2.y - ncy) ** 2;
  return d1 > d2 ? p1 : p2;
}

function drawCloudOutline(cx, cy, sphereR, c = ctx) {
  const R = PARTICLE_RADIUS;
  const N = Math.max(6, Math.round(2 * Math.PI * sphereR / (R * 1.5)));

  const centers = Array.from({ length: N }, (_, k) => {
    const a = k * 2 * Math.PI / N;
    return { x: cx + sphereR * Math.cos(a), y: cy + sphereR * Math.sin(a) };
  });

  const arcs = centers.map((cent, k) => {
    const prev = centers[(k - 1 + N) % N];
    const next = centers[(k + 1)     % N];
    const sp   = outerIntersection(cent, prev, R, cx, cy);
    const ep   = outerIntersection(cent, next, R, cx, cy);
    return {
      cx: cent.x, cy: cent.y,
      startAngle: Math.atan2(sp.y - cent.y, sp.x - cent.x),
      endAngle:   Math.atan2(ep.y - cent.y, ep.x - cent.x),
    };
  });

  const LIGHT = document.body.classList.contains('screenshot-mode');
  c.save();
  c.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(80,160,255,0.9)';
  c.shadowBlur  = LIGHT ? 0 : 22;
  c.strokeStyle = LIGHT ? '#333' : 'rgba(160,215,255,1)';
  c.lineWidth   = LIGHT ? 2.5 : 4;
  c.beginPath();

  c.moveTo(arcs[0].cx + R * Math.cos(arcs[0].startAngle),
           arcs[0].cy + R * Math.sin(arcs[0].startAngle));

  for (const arc of arcs) {
    c.arc(arc.cx, arc.cy, R, arc.startAngle, arc.endAngle, false);
  }

  c.closePath();
  c.stroke();
  c.restore();
}

// ─── v11-style particle renderer — stochastic jitter + fuzzy glow ────────────
const particleJitter = [];
// slow=false (default): step=1.8, decay=0.72 — σ≈1.83px, autocorr ~3.6 frames (used during fission/daughters)
// slow=true:            step=1.1, decay=0.90 — σ≈1.78px (same magnitude), autocorr ~10 frames (pre-neutron)
function updateParticleJitter(count, strength = 1, slow = false) {
  const step  = slow ? 1.1 : 1.8;
  const decay = slow ? 0.90 : 0.72;
  while (particleJitter.length < count) particleJitter.push({ x: 0, y: 0 });
  for (let i = 0; i < count; i++) {
    particleJitter[i].x += (Math.random() - 0.5) * step * strength;
    particleJitter[i].y += (Math.random() - 0.5) * step * strength;
    particleJitter[i].x *= decay;
    particleJitter[i].y *= decay;
  }
}

function drawParticles(particles, jitterScale = 1, radiusScale = 1, drawCtx = ctx) {
  const dc = drawCtx;
  const R = PARTICLE_RADIUS * radiusScale;
  // z ascending = back to front; protons after neutrons at same depth
  const sorted = [...particles].sort((a, b) =>
    ((a.z || 0) - (b.z || 0)) || ((a.type === 'proton') - (b.type === 'proton'))
  );
  for (const p of sorted) {
    const j  = (p.i != null && particleJitter[p.i]) ? particleJitter[p.i] : { x: 0, y: 0 };
    const px = p.x + j.x * jitterScale, py = p.y + j.y * jitterScale;
    const isProton = p.type === 'proton';
    const mid  = isProton ? '#ff1a65' : '#70707f';
    const core = isProton ? '#ff80b0' : '#b0b0c4';

    if (_flatFill) {
      if (_quality !== 'simple') {
        // Hi-res / Detailed: layered rings matching v11 particle appearance
        // Draw back-to-front using filled circles so rings never bleed inside
        const cW = 4;   // colored mid-ring width (world px — scales with zoom)
        const wW = 1;   // dark gray outline width (world px — scales with zoom)
        const R1 = R * 1.1;
        // Outermost: dark gray ring
        dc.fillStyle = 'rgba(40,40,40,0.85)';
        dc.beginPath(); dc.arc(px, py, R1, 0, Math.PI * 2); dc.fill();
        // Middle: mid color ring (matches v11 outer gradient color)
        dc.fillStyle = mid;
        dc.beginPath(); dc.arc(px, py, R1 - wW, 0, Math.PI * 2); dc.fill();
        // Inner: core (lighter) fill — matches v11 bright center
        dc.fillStyle = core;
        dc.beginPath(); dc.arc(px, py, R1 - wW - cW, 0, Math.PI * 2); dc.fill();
      } else {
        // Simple: thin white stroke over mid fill (original appearance)
        dc.fillStyle = mid;
        dc.beginPath(); dc.arc(px, py, R, 0, Math.PI * 2); dc.fill();
        dc.strokeStyle = 'rgba(255,255,255,0.45)';
        dc.lineWidth = 1;
        dc.stroke();
      }
    } else {
      // Base fill — soft edge fade
      const baseGrad = dc.createRadialGradient(px, py, 0, px, py, R * 1.1);
      baseGrad.addColorStop(0,    mid);
      baseGrad.addColorStop(0.82, mid);
      baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
      dc.fillStyle = baseGrad;
      dc.beginPath(); dc.arc(px, py, R * 1.1, 0, Math.PI * 2); dc.fill();

      // Inner glow with shadowBlur for fuzzy halo
      const innerGlow = dc.createRadialGradient(px, py, 0, px, py, R);
      innerGlow.addColorStop(0,   core);
      innerGlow.addColorStop(0.5, core);
      innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
      dc.save();
      dc.shadowColor = core;
      dc.shadowBlur  = 8;
      dc.globalAlpha = 0.82;
      dc.fillStyle = innerGlow;
      dc.beginPath(); dc.arc(px, py, R, 0, Math.PI * 2); dc.fill();
      dc.restore();
      dc.globalAlpha = 1;
    }

    // + label on protons
    if (isProton) {
      dc.fillStyle = 'rgba(255,255,255,0.88)';
      dc.font = `bold ${Math.max(6, Math.round(11 * radiusScale))}px Lexend, sans-serif`;
      dc.textAlign = 'center';
      dc.textBaseline = 'middle';
      dc.fillText('+', px, py + 1 * radiusScale);
    }
  }
}

// v=-1 → 0.83 (20% wider),  v=0 → 1.0,  v=1 → 2.0
// v=-1 → 0.1,  v=0 → 0.35,  v=1 → 2.0
function zoomFromSlider(v) {
  // Zoom-out half: exponential so mid-slider feels natural across a 100× range
  // v=-1 → 0.006 (whole lead atom fits), v=0 → 0.55 (2 shells fill screen)
  if (v <= 0) return 0.55 * Math.pow(0.006 / 0.55, -v);

// Shell definitions: capacity (max electrons), maxR (outer soft-wall radius)
// Shell 0 = innermost (holds 2), shells 1–3 hold 8 each → total 26
const SHELLS = [
  { capacity:  2, maxR:    220 },  // shell 0 (K)
  { capacity:  8, maxR:    440 },  // shell 1 (L)
  { capacity:  8, maxR:    880 },  // shell 2 (M)
  { capacity: 18, maxR:   1760 },  // shell 3 (N)

  { capacity: 32, maxR:  14080 },  // shell 6 (Q)

  { capacity: 32, maxR:  56320 },
  { capacity: 32, maxR: 112640 },
  { capacity: 32, maxR: 225280 },
  { capacity: 32, maxR: 450560 },
];
const E_MAX_TOTAL = SHELLS.reduce((s, sh) => s + sh.capacity, 0); // 278

function getShellForNewElectron() {
  let filled = 0;
  for (let s = 0; s < SHELLS.length; s++) {
    filled += SHELLS[s].capacity;
    if (electrons.length < filled) return s;
  }
  return SHELLS.length - 1; // overflow into last shell
}

// Offscreen glow image — built once, reused for all electrons

  const d = E_GLOW_R * 2 + 1;
  const oc = document.createElement('canvas');
  oc.width = oc.height = d;
  const oc2 = oc.getContext('2d');
  const g = oc2.createRadialGradient(E_GLOW_R, E_GLOW_R, 0, E_GLOW_R, E_GLOW_R, E_GLOW_R);
  g.addColorStop(0,    'rgba(255,255,220,1)');
  g.addColorStop(0.13, 'rgba(238,255,0,1)');
  g.addColorStop(0.40, 'rgba(238,255,0,0.6)');
  g.addColorStop(0.70, 'rgba(200,230,0,0.18)');
  g.addColorStop(1,    'rgba(180,220,0,0)');
  oc2.fillStyle = g;

}

function removeElectron() {

function addElectron() {
  if (!animParent) return;

  if (!_eGlowImg) _buildElectronGlow();
  const cx = animParent.cx, cy = animParent.cy;
  const shell = getShellForNewElectron();
  const shellR = getShellRadius(shell);
  const shellMinR = shell === 0 ? animParent.sphereR + eMinR : getShellRadius(shell - 1);
  const dist = (shellMinR + shellR) / 2;
  const angle = (electrons.length * (2 * Math.PI / 3) + Math.random() * 0.4) % (Math.PI * 2);
  const vCirc = Math.sqrt(eK / dist) * eDt * 30;
  electrons.push({
    x: cx + Math.cos(angle) * dist,
    y: cy + Math.sin(angle) * dist,
    vx: -Math.sin(angle) * vCirc,
    vy:  Math.cos(angle) * vCirc,
    trail: [],
    shell,
    angle,          // used by Shells tab
    dAngle: 0.008,  // start with a base orbital drift
    radialOffset: 0, // radial offset from shell center (world units)
    dRadial: 0,
  });
  updateElectronCount();
}

function clearElectrons() {
  electrons = [];
  updateElectronCount();
}

function syncNeutralElectrons() {
  const target = Math.min(customZ, E_MAX_TOTAL);
  while (electrons.length < target) addElectron();
  while (electrons.length > target) electrons.pop();
  updateElectronCount();
}

function updateElectronCount() {
  const el = document.getElementById('electronCount');
  if (el) el.textContent = electrons.length;
  updateParticleCounters();
}

function stepElectrons() {
  if (!animParent || !electrons.length) return;
  const cx = animParent.cx, cy = animParent.cy;
  // Electron-electron repulsion — cross-shell pairs repel 3× harder
  const E_MIN_SEP = 25;
  for (let i = 0; i < electrons.length; i++) {
    for (let j = i + 1; j < electrons.length; j++) {
      const ei = electrons[i], ej = electrons[j];
      const dx = ei.x - ej.x, dy = ei.y - ej.y;
      const dist = Math.max(Math.sqrt(dx * dx + dy * dy), E_MIN_SEP);
      const crossShell = (ei.shell !== ej.shell) ? 3.0 : 1.0;
      const F = eRepulse * crossShell / (dist * dist);
      const ax = F * dx / dist * eDt;
      const ay = F * dy / dist * eDt;
      ei.vx += ax; ei.vy += ay;
      ej.vx -= ax; ej.vy -= ay;
    }
  }
  // Min radius = nucleus surface + slider clearance (shared for all shells)
  const minR = animParent.sphereR + eMinR;
  for (const e of electrons) {
    const shellMaxR = getShellRadius(e.shell);
    const V_MAX = shellMaxR * 0.5;
    const dx = cx - e.x, dy = cy - e.y;
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < minR) dist = minR;
    const F = eK / (dist * dist);
    const ax = F * dx / dist;
    const ay = F * dy / dist;
    e.vx += ax * eDt;
    e.vy += ay * eDt;
    e.vx *= eDamp;
    e.vy *= eDamp;
    const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
    if (spd > V_MAX) { const s = V_MAX / spd; e.vx *= s; e.vy *= s; }
    e.x += e.vx * eDt;
    e.y += e.vy * eDt;
    const ndx = e.x - cx, ndy = e.y - cy;
    const nd = Math.sqrt(ndx * ndx + ndy * ndy);
    if (nd < minR) {
      const inv = minR / nd;
      e.x = cx + ndx * inv;
      e.y = cy + ndy * inv;
      const dot = e.vx * ndx / nd + e.vy * ndy / nd;
      if (dot < 0) { e.vx -= 2 * dot * ndx / nd; e.vy -= 2 * dot * ndy / nd; }
    }
    // Soft walls around shell radius
    const innerWall = e.shell === 0 ? minR : getShellRadius(e.shell - 1);
    const nextShellR = e.shell + 1 < SHELLS.length ? getShellRadius(e.shell + 1) : shellMaxR * 1.5;
    const outerWall  = shellMaxR + (nextShellR - shellMaxR) * 0.5;
    if (nd > shellMaxR) {
      const t = Math.min((nd - shellMaxR) / (outerWall - shellMaxR), 1);
      const wallAcc = (eK / (shellMaxR * shellMaxR)) * t * t * 15;
      e.vx -= wallAcc * (ndx / nd) * eDt;
      e.vy -= wallAcc * (ndy / nd) * eDt;
    }
    if (nd < shellMaxR && nd > innerWall) {
      const gap = shellMaxR - innerWall;
      const t = Math.min((shellMaxR - nd) / (gap * 0.5), 1);
      const wallAcc = (eK / (shellMaxR * shellMaxR)) * t * t * 8;
      e.vx += wallAcc * (ndx / nd) * eDt;
      e.vy += wallAcc * (ndy / nd) * eDt;
    }
    e.trail.push({ x: e.x, y: e.y });
    if (e.trail.length > eTrailLen) e.trail.shift();
  }
}

// Project a world-space point through the current canvas transform to screen pixels.
// We read the live DOMMatrix so this stays in sync with whatever transform draw() set.
function _worldToScreen(ctx, wx, wy) {
  const m = ctx.getTransform();
  return { x: m.a * wx + m.c * wy + m.e, y: m.b * wx + m.d * wy + m.f };
}

function drawElectrons(ctx) {
  if (!electrons.length || !_eGlowImg) return;

  // Project all trail points and heads to screen space before we reset the transform.
  // This keeps glow size and trail width constant in screen pixels regardless of zoom.
  const screenElectrons = electrons.map(e => ({
    sx: _worldToScreen(ctx, e.x, e.y),
    trail: e.trail.map(p => _worldToScreen(ctx, p.x, p.y)),
  }));

  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0); // draw in screen space
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 1.5;

  for (const se of screenElectrons) {
    const pts = se.trail;
    const n = pts.length;
    if (n < 2) continue;
    ctx.strokeStyle = '#eeff00';
    for (let i = 1; i < n; i++) {
      const t = i / (n - 1);
      ctx.globalAlpha = t * t * t * 0.9;
      const p0 = pts[i - 1];
      const p1 = pts[i];
      const sx = i === 1 ? p0.x : (pts[i - 2].x + p0.x) / 2;
      const sy = i === 1 ? p0.y : (pts[i - 2].y + p0.y) / 2;
      const ex = (p0.x + p1.x) / 2;
      const ey = (p0.y + p1.y) / 2;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(p0.x, p0.y, ex, ey);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// Auto neutron count: 1:1 up to Z=20, then +0.1× per 10 protons above 20.
function autoNeutrons(Z) {
  if (Z <= 20) return Z;
  const ratio = 1.1 + Math.ceil((Z - 20) / 10) * 0.1;
  return Math.round(ratio * Z);
}

let customZ = 0; // proton count driven by the slider

function setNucleusFromZ(Z) {
  customZ = Z;
  const N = autoNeutrons(Z);
  const W = canvas.width, H = canvas.height;
  if (Z === 0) {
    animParent = null;
    _imgParent = null;
  } else {
    animParent = generateNucleus(Z, N, W / 2, H / 2, currentSeed);
    buildNucleusImages();
  }
  // Keep shell electrons but clear trails since nucleus changed
  for (const e of electrons) e.trail = [];
  document.getElementById('protonSliderVal').textContent = Z;
  document.getElementById('protonSlider').value = Z;
  draw();
}

// Shell radius formula: actualRadius = (baseRadius * n²) / (Z * shrinkFactor + 1)
// where n = shell number starting at 1 (s+1), Z = proton count
let shellBaseR   = 200;
let shellShrink  = 0.05;

function getShellRadius(s) {
  const Z = Math.max(customZ, 1);
  function natural(i) {
    const n = i + 1;
    return (shellBaseR * n * n) / (Z * shellShrink + 1);
  }

  // Inner shell must clear the nucleus.
  // If it does, scale ALL shells up by the same factor so spacing stays even.
  const minR = animParent ? animParent.sphereR * 1.4 : 0;
  const n0   = natural(0);
  const scale = minR > n0 ? minR / n0 : 1;
  return natural(s) * scale;
}

// ─── Shells tab: orbital physics with radial band and long-range repulsion ────
const SHELL_ANGULAR_DAMP  = 0.994;   // very low damping — keeps orbital momentum
let SHELL_JITTER          = 0.05;    // random angular kick per frame
let eShellBandHW          = 60;      // shell band half-width (world units, fixed)
const SHELL_REPULSE_K     = 0.007;   // same-shell angular repulsion (1/dA — longer range)
const SHELL_MIN_SEP       = 0.05;    // min angular sep clamp
const SHELL_MAX_DA        = 0.022;   // max angular speed (rad/frame)
const SHELL_BASE_DA       = 0.007;   // minimum orbital speed — always cruising
const SHELL_RADIAL_K      = 0.0025;  // radial push from nearby same-shell electrons
const SHELL_RADIAL_DAMP   = 0.92;    // radial velocity damping
const SHELL_RADIAL_RESTORE = 0.018;  // restoring spring toward shell center radius
let eRadialJitter = 1.0;             // stochastic radial kick magnitude

function stepElectronsShells() {
  if (!animParent || !electrons.length) return;

  // Same-shell repulsion: angular (1/dA, longer range) + radial (one in, one out)
  for (let i = 0; i < electrons.length; i++) {
    for (let j = i + 1; j < electrons.length; j++) {
      const ei = electrons[i], ej = electrons[j];
      if (ei.shell !== ej.shell) continue;
      let dA = ei.angle - ej.angle;
      dA = ((dA + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
      const absDA = Math.abs(dA);
      if (absDA < 0.001) continue;
      const sign = dA > 0 ? 1 : -1;
      // 1/dA falloff — much longer range than previous 1/dA²
      const F = SHELL_REPULSE_K / Math.max(absDA, SHELL_MIN_SEP);
      ei.dAngle += sign * F;
      ej.dAngle -= sign * F;
      // Radial component: close electrons push each other in/out of band
      const radF = SHELL_RADIAL_K / Math.max(absDA * absDA, SHELL_MIN_SEP * SHELL_MIN_SEP);
      ei.dRadial = (ei.dRadial || 0) + radF;
      ej.dRadial = (ej.dRadial || 0) - radF;
    }
  }

  for (const e of electrons) {
    // Enforce minimum orbital speed — always cruising
    const dir = e.dAngle >= 0 ? 1 : -1;
    if (Math.abs(e.dAngle) < SHELL_BASE_DA) {
      e.dAngle += dir * (SHELL_BASE_DA - Math.abs(e.dAngle)) * 0.12;
    }

    e.dAngle += (Math.random() - 0.5) * SHELL_JITTER;
    e.dAngle *= SHELL_ANGULAR_DAMP;
    e.dAngle = Math.max(-SHELL_MAX_DA, Math.min(SHELL_MAX_DA, e.dAngle));
    e.angle = (e.angle + e.dAngle + Math.PI * 2) % (Math.PI * 2);

    // Radial offset within the band
    const shellR = getShellRadius(e.shell);
    const hw = eShellBandHW + shellR * 0.5;
    if (!e.dRadial) e.dRadial = 0;
    e.dRadial += (Math.random() - 0.5) * eRadialJitter;  // stochastic radial kick
    e.dRadial -= e.radialOffset * SHELL_RADIAL_RESTORE; // spring back to center
    e.dRadial *= SHELL_RADIAL_DAMP;
    e.dRadial = Math.max(-hw * 0.25, Math.min(hw * 0.25, e.dRadial));
    e.radialOffset = Math.max(-hw * 0.85, Math.min(hw * 0.85, (e.radialOffset || 0) + e.dRadial));
  }
}

function drawElectronsShells(ctx) {
  if (!animParent || !electrons.length) return;
  if (!_eGlowImg) _buildElectronGlow();
  const cx = animParent.cx, cy = animParent.cy;
  const Z = viewZoom;

  ctx.save();

  // Yellow shaded channel for each occupied shell
  const occupied = new Set(electrons.map(e => e.shell));
  for (const s of occupied) {
    const r = getShellRadius(s);
    const hw = eShellBandHW + r * 0.1;   // fixed base + radius-proportional term
    const rInner = Math.max(0, r - hw);
    const rOuter = r + hw;
    const grad = ctx.createRadialGradient(cx, cy, rInner, cx, cy, rOuter);
    grad.addColorStop(0,   'rgba(238,255,0,0)');
    grad.addColorStop(0.5, 'rgba(238,255,0,0.18)');
    grad.addColorStop(1,   'rgba(238,255,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
    ctx.fill();
  }

  // Electrons as glow dots within their shell band
  const worldR = 9 / Z;
  ctx.globalAlpha = 1;
  for (const e of electrons) {
    const r = getShellRadius(e.shell) + (e.radialOffset || 0);
    const ex = cx + Math.cos(e.angle) * r;
    const ey = cy + Math.sin(e.angle) * r;
    ctx.drawImage(_eGlowImg, ex - worldR, ey - worldR, worldR * 2, worldR * 2);
  }

  // Bright white core
  ctx.fillStyle = 'rgba(255,255,220,0.95)';
  const coreR = 1.5 / Z;
  for (const e of electrons) {
    const r = getShellRadius(e.shell) + (e.radialOffset || 0);
    ctx.beginPath();
    ctx.arc(cx + Math.cos(e.angle) * r, cy + Math.sin(e.angle) * r, coreR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Highlight selected electron with a ring
  if (selectedElectronIdx >= 0 && selectedElectronIdx < electrons.length && arrowMode > 0) {
    const se = electrons[selectedElectronIdx];
    const sr = getShellRadius(se.shell) + (se.radialOffset || 0);
    const sex = cx + Math.cos(se.angle) * sr;
    const sey = cy + Math.sin(se.angle) * sr;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5 / Z;
    ctx.setLineDash([4 / Z, 3 / Z]);
    ctx.beginPath();
    ctx.arc(sex, sey, 14 / Z, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

// ─── Shells 2: classic dotted-ring view ───────────────────────────────────────
function drawElectronsShells2(ctx) {
  if (!animParent || !electrons.length) return;
  if (!_eGlowImg) _buildElectronGlow();
  const cx = animParent.cx, cy = animParent.cy;
  const Z = viewZoom;

  ctx.save();

  // Dotted yellow circles for each occupied shell
  const occupied = new Set(electrons.map(e => e.shell));
  ctx.strokeStyle = 'rgba(238,255,0,0.5)';
  ctx.lineWidth = 1.5 / Z;
  ctx.setLineDash([10 / Z, 7 / Z]);
  for (const s of occupied) {
    ctx.beginPath();
    ctx.arc(cx, cy, getShellRadius(s), 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Electrons pinned to exact shell radius
  const worldR = 9 / Z;
  ctx.globalAlpha = 1;
  for (const e of electrons) {
    const r = getShellRadius(e.shell);
    const ex = cx + Math.cos(e.angle) * r;
    const ey = cy + Math.sin(e.angle) * r;
    ctx.drawImage(_eGlowImg, ex - worldR, ey - worldR, worldR * 2, worldR * 2);
  }

  // Bright white core
  ctx.fillStyle = 'rgba(255,255,220,0.95)';
  const coreR = 1.5 / Z;
  for (const e of electrons) {
    const r = getShellRadius(e.shell);
    ctx.beginPath();
    ctx.arc(cx + Math.cos(e.angle) * r, cy + Math.sin(e.angle) * r, coreR, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ─── Force viz panel ──────────────────────────────────────────────────────────
const FV_NUC_COLOR  = 'rgba(255,68,204,0.88)';   // magenta — nuclear attraction
const FV_REP_COLOR  = 'rgba(0,238,255,0.88)';    // cyan    — electron repulsion
const forceVizPanelEl = document.getElementById('forceVizPanel');
const forceVizCv      = document.getElementById('forceVizCanvas');

function fvArrowOnCtx(c, fromX, fromY, nx, ny, len, color, lw, headLen) {
  if (len < 1) return;
  const HEAD = headLen !== undefined ? headLen : Math.max(5, len * 0.234);
  const midX = fromX + nx * len * 0.5, midY = fromY + ny * len * 0.5;
  const tipX = fromX + nx * len,       tipY = fromY + ny * len;
  const perpX = -ny, perpY = nx;
  const baseX = tipX - nx * HEAD, baseY = tipY - ny * HEAD;
  c.strokeStyle = color; c.fillStyle = color;
  c.save();
  c.shadowColor = color; c.shadowBlur = 8;
  c.lineWidth = lw; c.globalAlpha = 1.0; c.lineCap = 'round';
  c.beginPath(); c.moveTo(fromX, fromY);
  c.quadraticCurveTo(midX, midY, baseX, baseY);
  c.stroke();
  const hw = lw * 1.44;
  c.beginPath();
  c.moveTo(tipX, tipY);
  c.lineTo(baseX + perpX * hw, baseY + perpY * hw);
  c.lineTo(baseX - perpX * hw, baseY - perpY * hw);
  c.closePath(); c.fill();
  c.restore();
}

// Horizontal camera shift so nucleus centers in the space left of the force panel.
function getCameraShiftX() {
  if (arrowMode > 0 && currentTab === 'shells' || currentTab === 'shells2') {
    const panelW = forceVizPanelEl.offsetWidth || 353;
    return -(panelW + 20) / 2;
  }
  return 0;
}

function syncForceVizVisibility() {
  forceVizPanelEl.style.display = (arrowMode > 0 && currentTab === 'shells' || currentTab === 'shells2') ? 'block' : 'none';
  if (arrowMode > 0 && currentTab === 'shells' || currentTab === 'shells2') drawForceViz();
  draw();
}

function drawForceViz() {
  if (arrowMode === 0 || currentTab !== 'shells' && currentTab !== 'shells2') return;
  const fvc = forceVizCv.getContext('2d');
  const W = forceVizCv.width, H = forceVizCv.height;
  fvc.clearRect(0, 0, W, H);

  if (selectedElectronIdx < 0 || selectedElectronIdx >= electrons.length || !animParent) {
    // No selection — show hint text
    fvc.fillStyle = 'rgba(255,255,255,0.3)';
    fvc.font = '13px Lexend, sans-serif';
    fvc.textAlign = 'center';
    fvc.textBaseline = 'middle';
    fvc.fillText('Click an electron to see its forces', W / 2, H / 2);
    return;
  }

  const cx = animParent.cx, cy = animParent.cy;
  const se = electrons[selectedElectronIdx];
  const sr = getShellRadius(se.shell);
  const sex = cx + Math.cos(se.angle) * sr;
  const sey = cy + Math.sin(se.angle) * sr;

  // ── Nuclear attraction (Z protons treated as point charge at center) ──────
  const dxN = cx - sex, dyN = cy - sey;
  const distN = Math.sqrt(dxN * dxN + dyN * dyN);
  const fNuc = eK * Math.max(customZ, 1) / (distN * distN);
  const nxN = dxN / distN, nyN = dyN / distN;

  // ── Electron repulsion (vector sum from all other electrons) ──────────────
  let frex = 0, frey = 0;
  for (let i = 0; i < electrons.length; i++) {
    if (i === selectedElectronIdx) continue;
    const oe = electrons[i];
    const oex = cx + Math.cos(oe.angle) * getShellRadius(oe.shell);
    const oey = cy + Math.sin(oe.angle) * getShellRadius(oe.shell);
    const ddx = sex - oex, ddy = sey - oey;
    const d2 = Math.max(ddx * ddx + ddy * ddy, 625);
    const d = Math.sqrt(d2);
    frex += eK / d2 * ddx / d;
    frey += eK / d2 * ddy / d;
  }
  const fRep = Math.sqrt(frex * frex + frey * frey);

  // Log-scale arrow length so very different forces stay readable side-by-side
  const REF_F = eK * Math.max(customZ, 1) / (sr * sr);
  const MAX_LEN = Math.min(W, H) * 0.38;
  function arrowLen(f) {
    return MAX_LEN * Math.log1p(f / REF_F * 4) / Math.log1p(4);
  }

  // Draw in panel space with the electron at center
  const panelCx = W / 2, panelCy = H / 2;
  const panelR  = Math.min(W, H) * 0.10; // nucleus thumbnail radius

  // Nucleus thumbnail (cloud outline)
  fvc.save();
  fvc.strokeStyle = 'rgba(255,255,255,0.18)';
  fvc.lineWidth = 1;
  fvc.beginPath();
  fvc.arc(panelCx, panelCy, panelR, 0, Math.PI * 2);
  fvc.stroke();
  fvc.restore();

  // Electron dot
  fvc.fillStyle = '#eeff00';
  fvc.shadowColor = '#eeff00'; fvc.shadowBlur = 8;
  const eDot = 5;
  const ePanelX = panelCx + nxN * (panelR + MAX_LEN * 0.25); // offset from nucleus toward electron
  const ePanelY = panelCy + nyN * (panelR + MAX_LEN * 0.25);

  // Use actual direction from nucleus for layout — nxN/nyN points toward nucleus from electron
  // so electron is in direction (-nxN, -nyN) from nucleus
  const eDir = { x: -nxN, y: -nyN };
  const ePx = panelCx + eDir.x * (panelR + MAX_LEN * 0.28);
  const ePy = panelCy + eDir.y * (panelR + MAX_LEN * 0.28);

  fvc.beginPath(); fvc.arc(ePx, ePy, eDot, 0, Math.PI * 2); fvc.fill();
  fvc.shadowBlur = 0;

  // Nuclear attraction arrow: from electron toward nucleus
  const fixedHead = MAX_LEN * 0.12;
  fvArrowOnCtx(fvc, ePx, ePy, nxN, nyN, arrowLen(fNuc), FV_NUC_COLOR, 3, fixedHead);

  // Electron repulsion arrow: from electron away from net repulsion direction
  if (fRep > 0.001) {
    const nxR = frex / fRep, nyR = frey / fRep;
    fvArrowOnCtx(fvc, ePx, ePy, nxR, nyR, arrowLen(fRep), FV_REP_COLOR, 3, fixedHead);
  } else {
    fvc.fillStyle = 'rgba(0,238,255,0.3)';
    fvc.font = '11px Lexend, sans-serif';
    fvc.textAlign = 'center';
    fvc.textBaseline = 'top';
    fvc.fillText('(no other electrons)', panelCx, H - 18);
  }
}

function initNuclei() {
  animParent = null;
  _imgParent = null;
  customZ = 0;
  document.getElementById('protonSlider').value = 0;
  document.getElementById('protonSliderVal').textContent = 0;
}

// Pre-render a nucleus to an offscreen canvas using the full gradient renderer.
const _NUCLEUS_IMG_PAD = PARTICLE_RADIUS * 2 + 2;
function _prerenderNucleus(nucleus) {
  const r    = nucleus.sphereR;
  const size = Math.ceil((r + _NUCLEUS_IMG_PAD) * 2);
  const oc   = document.createElement('canvas');
  oc.width = oc.height = size;
  oc._natR = r;
  const ocCtx = oc.getContext('2d');
  const dx = size / 2 - nucleus.cx, dy = size / 2 - nucleus.cy;
  const pts = nucleus.particles.map(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
  const savedFlat = _flatFill;
  _flatFill = false;  // always render with full gradient quality
  drawParticles(pts, 0, 1, ocCtx);
  _flatFill = savedFlat;
  return oc;
}

function buildNucleusImages() {
  _imgParent = _prerenderNucleus(animParent);
}

// ─── Nucleus icon rendering ──────────────────────────────────────────────────
function buildNucleusIconParticles(nP, nN, seed) {
  const ICON_R  = 4;
  const nTotal  = nP + nN;
  const packFrac = 0.62;
  const vol    = nTotal * (4/3 * Math.PI * ICON_R ** 3) / packFrac;
  const sphR   = Math.cbrt(vol * 3 / (4 * Math.PI)) * 1.05;
  const minD2  = (ICON_R * 2.05) ** 2;

  let s = seed >>> 0;
  const rand = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };

  const pts = [];
  let tries = 0;
  while (pts.length < nTotal && tries < nTotal * 300) {
    tries++;
    const r3 = rand(), th = Math.acos(2 * rand() - 1), ph = rand() * 2 * Math.PI;
    const r  = sphR * Math.cbrt(r3);
    const ox = r * Math.sin(th) * Math.cos(ph);
    const oy = r * Math.sin(th) * Math.sin(ph);
    const oz = r * Math.cos(th);
    let ok = true;
    for (const q of pts) {
      if ((ox-q.ox)**2 + (oy-q.oy)**2 + (oz-q.oz)**2 < minD2) { ok = false; break; }
    }
    if (ok) pts.push({ ox, oy, oz, type: pts.length < nP ? 'proton' : 'neutron', jx: 0, jy: 0 });
  }
  return pts.sort((a, b) => a.oz - b.oz);
}
const nucleusIconParticlesMap = {};
for (const [key, nd] of Object.entries(NUCLEUS_DEFS)) {
  nucleusIconParticlesMap[key] = buildNucleusIconParticles(nd.iconNP, nd.iconNN, nd.iconSeed);
}

function drawNucleusIcon(canvas, particles, scale = 1.0) {
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const R = 4 * scale;
  c.clearRect(0, 0, w, h);
  for (const p of particles) {
    const px = cx + (p.ox + p.jx) * scale;
    const py = cy + (p.oy + p.jy) * scale;
    const isProton = p.type === 'proton';
    const mid  = isProton ? '#ff1a65' : '#70707f';
    const core = isProton ? '#ff80b0' : '#b0b0c4';
    const baseGrad = c.createRadialGradient(px, py, 0, px, py, R * 1.1);
    baseGrad.addColorStop(0,    mid);
    baseGrad.addColorStop(0.82, mid);
    baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
    c.fillStyle = baseGrad;
    c.beginPath(); c.arc(px, py, R * 1.1, 0, Math.PI * 2); c.fill();
    const innerGlow = c.createRadialGradient(px, py, 0, px, py, R);
    innerGlow.addColorStop(0,   core);
    innerGlow.addColorStop(0.5, core);
    innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
    c.save();
    c.shadowColor = core;
    c.shadowBlur  = 4 * scale;
    c.globalAlpha = 0.82;
    c.fillStyle = innerGlow;
    c.beginPath(); c.arc(px, py, R, 0, Math.PI * 2); c.fill();
    c.restore();
    c.globalAlpha = 1;
  }
}

const miniNucleusIconParticles = (() => {
  const ICON_R = 2;
  const nP = 7, nN = 14, nTotal = nP + nN;
  const packFrac = 0.62;
  const vol   = nTotal * (4/3 * Math.PI * ICON_R**3) / packFrac;
  const sphR  = Math.cbrt(vol * 3 / (4 * Math.PI)) * 1.05;
  const minD2 = (ICON_R * 2.05)**2;
  let s = 0xabcd1234;
  const rand = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  const pts = [];
  let tries = 0;
  while (pts.length < nTotal && tries < nTotal * 300) {
    tries++;
    const r3 = rand(), th = Math.acos(2 * rand() - 1), ph = rand() * 2 * Math.PI;
    const r  = sphR * Math.cbrt(r3);
    const ox = r * Math.sin(th) * Math.cos(ph);
    const oy = r * Math.sin(th) * Math.sin(ph);
    const oz = r * Math.cos(th);
    let ok = true;
    for (const q of pts) {
      if ((ox-q.ox)**2 + (oy-q.oy)**2 + (oz-q.oz)**2 < minD2) { ok = false; break; }
    }
    if (ok) pts.push({ ox, oy, oz, type: pts.length < nP ? 'proton' : 'neutron', jx: 0, jy: 0 });
  }
  return pts.sort((a, b) => a.oz - b.oz);
})();

function drawMiniNucleusIcon(canvas) {
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const R = 2;
  c.clearRect(0, 0, w, h);
  for (const p of miniNucleusIconParticles) {
    const px = cx + p.ox + p.jx;
    const py = cy + p.oy + p.jy;
    const isProton = p.type === 'proton';
    const mid  = isProton ? '#ff1a65' : '#70707f';
    const core = isProton ? '#ff80b0' : '#b0b0c4';
    const baseGrad = c.createRadialGradient(px, py, 0, px, py, R * 1.1);
    baseGrad.addColorStop(0, mid); baseGrad.addColorStop(0.82, mid); baseGrad.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = baseGrad; c.beginPath(); c.arc(px, py, R * 1.1, 0, Math.PI * 2); c.fill();
    const innerGlow = c.createRadialGradient(px, py, 0, px, py, R);
    innerGlow.addColorStop(0, core); innerGlow.addColorStop(0.5, core); innerGlow.addColorStop(1, 'rgba(0,0,0,0)');
    c.save(); c.shadowColor = core; c.shadowBlur = 3; c.globalAlpha = 0.82;
    c.fillStyle = innerGlow; c.beginPath(); c.arc(px, py, R, 0, Math.PI * 2); c.fill();
    c.restore(); c.globalAlpha = 1;

}

function drawOutlineIcon() {
  const ic = document.getElementById('outlineModeIcon');
  if (!ic) return;
  const c = ic.getContext('2d');
  const w = ic.width, h = ic.height;
  const cx = w / 2, cy = h / 2;
  const sR = Math.min(w, h) * 0.36;
  const R  = 2.5;
  const N  = Math.max(5, Math.round(2 * Math.PI * sR / (R * 1.5)));
  const centers = Array.from({ length: N }, (_, k) => {
    const a = k * 2 * Math.PI / N;
    return { x: cx + sR * Math.cos(a), y: cy + sR * Math.sin(a) };
  });
  function iconOuterIntersect(c1, c2) {
    const dx = c2.x - c1.x, dy = c2.y - c1.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    const h2 = Math.sqrt(Math.max(0, R * R - (d / 2) ** 2));
    const mx = (c1.x + c2.x) / 2, my = (c1.y + c2.y) / 2;
    const px = -dy / d * h2, py = dx / d * h2;
    const p1 = { x: mx + px, y: my + py }, p2 = { x: mx - px, y: my - py };
    const d1 = (p1.x - cx)**2 + (p1.y - cy)**2;
    const d2 = (p2.x - cx)**2 + (p2.y - cy)**2;
    return d1 > d2 ? p1 : p2;
  }
  const arcs = centers.map((pt, k) => {
    const prev = centers[(k - 1 + N) % N], next = centers[(k + 1) % N];
    const sp = iconOuterIntersect(pt, prev);
    const ep = iconOuterIntersect(pt, next);
    return { cx: pt.x, cy: pt.y, startAngle: Math.atan2(sp.y - pt.y, sp.x - pt.x), endAngle: Math.atan2(ep.y - pt.y, ep.x - pt.x) };
  });
  c.clearRect(0, 0, w, h);
  c.save();
  c.shadowColor = 'rgba(80,160,255,0.9)'; c.shadowBlur = 4;
  c.strokeStyle = 'rgba(160,215,255,1)'; c.lineWidth = 1;
  c.beginPath();
  c.moveTo(arcs[0].cx + R * Math.cos(arcs[0].startAngle), arcs[0].cy + R * Math.sin(arcs[0].startAngle));
  for (const arc of arcs) c.arc(arc.cx, arc.cy, R, arc.startAngle, arc.endAngle, false);
  c.closePath(); c.stroke(); c.restore();
}

let _iconLast = -67;
function nucleusIconLoop(now) {
  if (now - _iconLast >= 67) {   // ~15 fps
    _iconLast = now;
    for (const pts of Object.values(nucleusIconParticlesMap)) {

}

function draw() {
  ctx.fillStyle = document.body.classList.contains('screenshot-mode') ? getBgColor() : '#05040f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!animParent) { drawEnergyGraph(); return; }

  ctx.save();
  const _W = canvas.width, _H = canvas.height;
  const _tbH = document.getElementById('toolbar').offsetHeight;
  const _sbEl = document.getElementById('scrubBar');
  const _sbH  = _sbEl.classList.contains('visible') ? _sbEl.offsetHeight : 0;
  const _centerY = (_tbH + _H - _sbH) / 2;
  const _camX = _W / 2 + getCameraShiftX();
  ctx.translate(_camX, _centerY);
  ctx.scale(viewZoom, viewZoom);
  ctx.translate(-_W / 2, -_H / 2);

  const showAtomicRadius = document.getElementById('showElectric').checked;
  if (showAtomicRadius && electrons.length) {
    const outerShell = Math.max(...electrons.map(e => e.shell));
    const outerR = getShellRadius(outerShell);
    const cx = animParent.cx, cy = animParent.cy;
    const Z = viewZoom;
    ctx.save();
    // Dashed ring
    ctx.strokeStyle = 'rgba(100,180,255,0.55)';
    ctx.lineWidth = 1.5 / Z;
    ctx.setLineDash([8 / Z, 5 / Z]);
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    // Radius line
    ctx.strokeStyle = 'rgba(100,180,255,0.3)';
    ctx.lineWidth = 1 / Z;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + outerR, cy);
    ctx.stroke();
    // Label in world space (font scaled by 1/zoom so it stays constant screen size)
    const arUnit = (outerR / 100).toFixed(2);
    ctx.font = `${13 / Z}px Lexend, sans-serif`;
    ctx.fillStyle = 'rgba(140,200,255,0.9)';
    ctx.textAlign = 'center';
    ctx.fillText(`r = ${arUnit}`, cx + outerR / 2, cy - 10 / Z);
    ctx.restore();
  }
  if (!showParticles) drawCloudOutline(animParent.cx, animParent.cy, animParent.sphereR);
  if (showParticles) drawParticles(animParent.particles, 1);

  if (currentTab === 'trails') drawElectrons(ctx);
  else if (currentTab === 'shells2') drawElectronsShells2(ctx);
  else drawElectronsShells(ctx);

  ctx.restore();
  drawEnergyGraph();
  updateParticleCounters();
  drawForceViz();
}
