function drawEnergyGraph() {
  const W = egCanvas.width, H = egCanvas.height;
  const PAD = 8;
  const gH  = H - PAD * 2;
  const zs = egZoomStart, ze = egZoomEnd, zLen = ze - zs;

  egCtx.clearRect(0, 0, W, H);

  const LIGHT = document.body.classList.contains('screenshot-mode');
  const _gridCol  = LIGHT ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.06)';
const _axisCol  = LIGHT ? 'rgba(0,0,0,0.55)' : 'rgba(0,200,255,0.35)';
  const _axisGlow = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(0,200,255,0.5)';
  const _ieCol    = LIGHT ? '#777'             : '#7b6fff';
  const _ieGlow   = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(120,100,255,0.9)';
  const _keCol    = LIGHT ? '#000'             : '#ff3a6e';
  const _keGlow   = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(255,45,100,0.9)';
  const _selFill  = LIGHT ? 'rgba(0,0,0,0.08)' : 'rgba(120,100,255,0.12)';
  const _selStk   = LIGHT ? 'rgba(0,0,0,0.4)'  : 'rgba(120,100,255,0.6)';

  // Faint horizontal grid at 25 / 50 / 75%
  egCtx.strokeStyle = _gridCol;
  egCtx.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const y = PAD + gH * (1 - i / 4);
    egCtx.beginPath(); egCtx.moveTo(0, y); egCtx.lineTo(W, y); egCtx.stroke();
  }


  // Advance high-water mark then compute reveal and cursor pixels
  maxRevealedFrac = Math.max(maxRevealedFrac, currentScrubFrac);
  const revealFrac = Math.max(zs, Math.min(ze, maxRevealedFrac));
  const revealPx   = Math.round((revealFrac - zs) / zLen * (W - 1));
  const curFrac = Math.max(zs, Math.min(ze, currentScrubFrac));
  const curPx   = Math.round((curFrac - zs) / zLen * (W - 1));

  // Bottom axis — always visible
  egCtx.save();
  egCtx.shadowBlur  = LIGHT ? 0 : 6;
  egCtx.shadowColor = _axisGlow;
  egCtx.strokeStyle = _axisCol;
  egCtx.lineWidth   = 1;
  egCtx.beginPath(); egCtx.moveTo(0, H - PAD); egCtx.lineTo(W, H - PAD); egCtx.stroke();
  egCtx.restore();

  // Neon line: full graph always shown, cursor marks current position
  function plotLine(color, glowColor, getVal, dash = []) {
    const ys = new Float32Array(W);
    for (let px = 0; px < W; px++) {
      const frac = zs + (px / (W - 1)) * zLen;
      ys[px] = PAD + gH * (1 - getVal(computeEnergy(frac)));
    }
    function strokeSeg(fromPx, toPx, lw, blur, alpha) {
      if (fromPx > toPx) return;
      egCtx.save();
      egCtx.setLineDash(dash);
      egCtx.globalAlpha = alpha;
      egCtx.shadowBlur  = blur;
      egCtx.shadowColor = glowColor;
      egCtx.strokeStyle = color;
      egCtx.lineWidth   = lw;
      egCtx.beginPath();
      for (let px = fromPx; px <= toPx; px++) {
        if (px === fromPx) egCtx.moveTo(px, ys[px]); else egCtx.lineTo(px, ys[px]);
      }
      egCtx.stroke();
      egCtx.restore();
    }
    // Draw up to the high-water mark — traces live, stays drawn after scrub
    strokeSeg(0, revealPx, 8,  28, 0.25);
    strokeSeg(0, revealPx, 3,  10, 0.55);
    strokeSeg(0, revealPx, 1.5, 0, 1.00);
  }

  plotLine(_ieCol, _ieGlow, e => e.eie, [5, 4]);  // Energy in Fields
  plotLine(_keCol, _keGlow, e => e.ke);            // Energy of Motion

  // Drag-to-zoom selection overlay
  if (egDragStartPx !== null && egDragCurPx !== null) {
    const x0 = Math.min(egDragStartPx, egDragCurPx);
    const x1 = Math.max(egDragStartPx, egDragCurPx);
    egCtx.fillStyle   = _selFill;
    egCtx.fillRect(x0, 0, x1 - x0, H);
    egCtx.strokeStyle = _selStk;
    egCtx.lineWidth   = 1;
    egCtx.strokeRect(x0, 0, x1 - x0, H);
  }

  // Cursor — neon white with glow (black in light mode)
  const cx = curPx;
  egCtx.save();
  egCtx.shadowBlur  = LIGHT ? 0 : 8;
  egCtx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(255,255,255,0.7)';
  egCtx.strokeStyle = LIGHT ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.85)';
  egCtx.lineWidth   = 1;
  egCtx.beginPath(); egCtx.moveTo(cx, 0); egCtx.lineTo(cx, H); egCtx.stroke();
  egCtx.restore();
}

// ─── Canvas click: select electron for force display ─────────────────────────
canvas.addEventListener('click', e => {
  if (arrowMode === 0 || currentTab !== 'shells' && currentTab !== 'shells2' || !animParent || !electrons.length) return;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  // Convert screen → world
  const _W = canvas.width, _H = canvas.height;
  const _tbH = document.getElementById('toolbar').offsetHeight;
  const _sbEl = document.getElementById('scrubBar');
  const _sbH  = _sbEl.classList.contains('visible') ? _sbEl.offsetHeight : 0;
  const _centerY = (_tbH + _H - _sbH) / 2;
  const _camX2 = _W / 2 + getCameraShiftX();
  const wx = (sx - _camX2) / viewZoom + _W / 2;
  const wy = (sy - _centerY) / viewZoom + _H / 2;

  const cx = animParent.cx, cy = animParent.cy;
  const HIT_R = 20 / viewZoom; // world-space hit radius
  let best = -1, bestD2 = HIT_R * HIT_R;
  for (let i = 0; i < electrons.length; i++) {
    const ei = electrons[i];
    const r = getShellRadius(ei.shell);
    const ex = cx + Math.cos(ei.angle) * r;
    const ey = cy + Math.sin(ei.angle) * r;
    const d2 = (wx - ex) ** 2 + (wy - ey) ** 2;
    if (d2 < bestD2) { bestD2 = d2; best = i; }
  }
  selectedElectronIdx = best; // -1 if clicked empty space
  syncForceVizVisibility();
  draw();
});

// ─── Energy graph drag-to-zoom ────────────────────────────────────────────────
egCanvas.addEventListener('mousedown', e => {
  egDragStartPx = e.offsetX;
  egDragCurPx   = e.offsetX;
  e.preventDefault();
});
egCanvas.addEventListener('mousemove', e => {
  if (egDragStartPx === null) return;
  egDragCurPx = e.offsetX;
  drawEnergyGraph();
});
egCanvas.addEventListener('mouseup', e => {
  if (egDragStartPx === null) return;
  const x0 = Math.min(egDragStartPx, e.offsetX);
  const x1 = Math.max(egDragStartPx, e.offsetX);
  egDragStartPx = null; egDragCurPx = null;
  const W = egCanvas.width;
  if (x1 - x0 < 4) { drawEnergyGraph(); return; }  // too small — ignore
  const prevStart = egZoomStart, zLen = egZoomEnd - egZoomStart;
  egZoomStart = prevStart + (x0 / W) * zLen;
  egZoomEnd   = prevStart + (x1 / W) * zLen;
  drawEnergyGraph();
  updateGraphBtn();
});
egCanvas.addEventListener('mouseleave', e => {
  if (egDragStartPx !== null) { egDragStartPx = null; egDragCurPx = null; drawEnergyGraph(); }
});
egCanvas.addEventListener('dblclick', () => {
  egZoomStart = 0; egZoomEnd = 1;
  drawEnergyGraph();
  updateGraphBtn();
});

// ─── Themes ───────────────────────────────────────────────────────────────────
const THEMES = {
  A: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.25)', accent1glow:'rgba(255,45,120,0.55)',
    accent2:'#1a6eff', accent2dim:'rgba(26,110,255,0.18)',  accent2glow:'rgba(26,110,255,0.45)',
    uibg:'rgba(8,6,24,0.38)', uiborder:'rgba(255,255,255,0.07)',
    textdim:'rgba(220,215,255,0.55)', textbright:'rgba(240,235,255,0.92)',
    bg:'#05040f',
  },
  B: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.22)', accent1glow:'rgba(255,45,120,0.5)',
    accent2:'#bd00ff', accent2dim:'rgba(189,0,255,0.18)',  accent2glow:'rgba(189,0,255,0.42)',
    uibg:'rgba(8,4,22,0.42)', uiborder:'rgba(189,0,255,0.14)',
    textdim:'rgba(230,200,255,0.52)', textbright:'rgba(248,232,255,0.92)',
    bg:'#05030f',
  },
  C: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.22)', accent1glow:'rgba(255,45,120,0.5)',
    accent2:'#00f5e0', accent2dim:'rgba(0,245,224,0.15)',  accent2glow:'rgba(0,245,224,0.4)',
    uibg:'rgba(6,4,20,0.40)', uiborder:'rgba(255,45,120,0.12)',
    textdim:'rgba(220,210,255,0.52)', textbright:'rgba(245,235,255,0.92)',
    bg:'#04030e',
  },
};

function applyTheme(key) {
  const t = THEMES[key];
  const r = document.documentElement.style;
  r.setProperty('--accent1',      t.accent1);
  r.setProperty('--accent1-dim',  t.accent1dim);
  r.setProperty('--accent1-glow', t.accent1glow);
  r.setProperty('--accent2',      t.accent2);
  r.setProperty('--accent2-dim',  t.accent2dim);
  r.setProperty('--accent2-glow', t.accent2glow);
  r.setProperty('--ui-bg',        t.uibg);
  r.setProperty('--ui-border',    t.uiborder);
  r.setProperty('--text-dim',     t.textdim);
  r.setProperty('--text-bright',  t.textbright);
  document.body.style.background = t.bg;
  document.body.classList.remove('screenshot-mode');
  document.getElementById('themeLight').classList.remove('active');
  document.querySelectorAll('.theme-btn:not(#themeLight):not([data-theme="L"])').forEach(b => b.classList.remove('active'));
  document.getElementById('theme'+key).classList.add('active');
  draw();
}
document.getElementById('themeA').addEventListener('click', () => applyTheme('A'));
document.getElementById('themeB').addEventListener('click', () => applyTheme('B'));
document.getElementById('themeC').addEventListener('click', () => applyTheme('C'));
function getBgColor() { return document.getElementById('bgColorPicker').value; }
document.getElementById('bgColorPicker').addEventListener('input', function() {
  document.documentElement.style.setProperty('--bg-color', this.value);
  draw();
});
document.getElementById('themeLight').addEventListener('click', () => {
  const on = document.body.classList.toggle('screenshot-mode');
  document.getElementById('themeLight').classList.toggle('active', on);
  draw();
});
applyTheme('A');

// ─── Init ─────────────────────────────────────────────────────────────────────
setParticleWheelActive(document.querySelector('.awheel-item[data-pmode="particles"]'));
initNuclei();

// Startup benchmark — measure actual gradient render cost and set initial quality.
// Thresholds are per 100 particles; the full nucleus is ~220 so multiply by ~2.2
// to project real frame cost.
//   < 3ms / 100p → hi-res   (< ~7ms projected — fine at 60fps)
//   3–6ms / 100p → detailed (~7–13ms projected — reduced effects)
//   > 6ms / 100p → simple   (> ~13ms projected — minimal rendering)
(function _startupBenchmark() {
  const ms = _runPerfBenchmark();
  if (ms > 6) {
    const hiOpt = document.querySelector('#qualitySelect option[value="hi-res"]');
    if (hiOpt) hiOpt.remove();
    _applyQuality('simple');
  } else if (ms > 3) {
    _applyQuality('detailed');
  }
  // else stays 'hi-res' (default)
}());

setNucleusFromZ(8);
syncNeutralElectrons();
draw();
if (!idleParticleRAF) idleParticleLoop();

// ── Bug report button ─────────────────────────────────────────────────────
function getBugState() {
  return {
    sim:          'atom-builder',
    nucleus:      selectedNucleusKey,
    viewZoom:     +viewZoom.toFixed(3),
    actionLog:    actionLog.slice(),
  };
}
document.getElementById('bugReportBtn').addEventListener('click', e => {
  e.preventDefault();
  const state = encodeURIComponent(JSON.stringify(getBugState()));
  const url   = `https://ghostoutfit.github.io/protons/dev/bug-report.html?sim=atom-builder&sourceUrl=${encodeURIComponent(location.href)}&state=${state}`;
  document.getElementById('bugModalFrame').src = url;
  document.getElementById('bugModal').style.display = 'flex';
});
function closeBugModal() {
  document.getElementById('bugModal').style.display = 'none';
  document.getElementById('bugModalFrame').src = 'about:blank';
}
document.getElementById('bugModal').addEventListener('click', e => {
  if (e.target === document.getElementById('bugModal')) closeBugModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('bugModal').style.display === 'flex') closeBugModal();
});

</script>
